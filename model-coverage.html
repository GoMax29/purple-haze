  s.bindTooltip('<b>'+m.n+'</b><br>'+P[m.p].flag+' '+P[m.p].name+' \u00b7 '+m.res+' \u00b7 '+m.h+'h \u00b7 '+{short:'Short',mid:'Mid',long:'Long'}[m.tier],{sticky:true,direction:'top'});
  s.addTo(map);layers[m.id]=s}
function rmLyr(id){if(layers[id]){map.removeLayer(layers[id]);delete layers[id]}}
function sync(){M.forEach(function(m){if(vis[m.id]&&!layers[m.id])addLyr(m);else if(!vis[m.id]&&layers[m.id])rmLyr(m.id)});uSt()}
function hl(id,on){if(!layers[id])return;layers[id].setStyle({weight:on?4:2,fillOpacity:on?.18:.07,opacity:on?1:.75});if(on)layers[id].bringToFront()}

function buildSB(){
  var g={};M.forEach(function(m){if(!g[m.p])g[m.p]=[];g[m.p].push(m)});
  var ord=['dwd','noaa','mf','ecmwf','ukmo','jma','cmc','metno','knmi','dmi','arpae','mch','bom','cma','kma'];
  var c=document.getElementById('model-list');c.innerHTML='';
  ord.forEach(function(pk){var ms=g[pk];if(!ms)return;var pv=P[pk];
    var gr=document.createElement('div');gr.className='pg';
    var hd=document.createElement('div');hd.className='ph';
    var pcb=document.createElement('input');pcb.type='checkbox';pcb.checked=ms.some(function(m){return vis[m.id]});
    pcb.addEventListener('click',function(e){e.stopPropagation()});
    pcb.addEventListener('change',function(e){var c=e.target.checked;ms.forEach(function(m){vis[m.id]=c;var cb=document.querySelector('input[data-id="'+m.id+'"]');if(cb)cb.checked=c});sync()});
    hd.appendChild(pcb);
    var hs=document.createElement('span');hs.style.display='contents';
    hs.innerHTML='<span class="flag">'+pv.flag+'</span><span class="pname">'+pv.name+'</span><span class="pcnt">'+ms.length+'</span><span class="chev">\u25bc</span>';
    hd.appendChild(hs);hd.title=pv.full;gr.appendChild(hd);
    var li=document.createElement('div');li.className='pm';
    ms.forEach(function(m){var e=document.createElement('label');e.className='me';
      e.innerHTML='<span class="cs" style="background:'+m.color+'"></span><input type="checkbox" data-id="'+m.id+'"'+(vis[m.id]?' checked':'')+'/><span class="mn" title="'+m.n+'">'+m.n+'</span><span class="tb '+{short:'tb-s',mid:'tb-m',long:'tb-l'}[m.tier]+'">'+{short:'S',mid:'M',long:'L'}[m.tier]+'</span><span class="fam-tag">'+FL[m.fam]+'</span><span class="mr">'+m.res+'</span>';
      e.querySelector('input').addEventListener('change',function(ev){vis[m.id]=ev.target.checked;sync()});
      e.addEventListener('mouseenter',function(){hl(m.id,true)});e.addEventListener('mouseleave',function(){hl(m.id,false)});
      li.appendChild(e)});
    gr.appendChild(li);hd.addEventListener('click',function(){hd.classList.toggle('collapsed');li.classList.toggle('hidden')});c.appendChild(gr)})}

function uSt(){document.getElementById('vis-count').textContent=M.filter(function(m){return vis[m.id]}).length+' visible'}
function toggleAll(on){M.forEach(function(m){vis[m.id]=on});document.querySelectorAll('#model-list input[type=checkbox]').forEach(function(cb){cb.checked=on});sync()}
function toggleByTier(t){M.forEach(function(m){vis[m.id]=(m.tier===t)});
  document.querySelectorAll('#model-list input[data-id]').forEach(function(cb){var m=M.find(function(x){return x.id===cb.dataset.id});if(m)cb.checked=vis[m.id]});
  document.querySelectorAll('.ph input[type=checkbox]').forEach(function(cb){var kids=cb.closest('.pg').querySelectorAll('input[data-id]');cb.checked=Array.from(kids).some(function(k){return k.checked})});sync()}
function fitVis(){var a=Object.values(layers);if(!a.length)return;map.fitBounds(L.featureGroup(a).getBounds().pad(.05))}

var sI=document.getElementById('search-input'),sB=document.getElementById('search-btn'),sR=document.getElementById('search-results');
var dT=null,aIdx=-1;
function doSearch(q){if(!q||q.trim().length<2)return;var now=Date.now();if(now-lastST<400)return;lastST=now;
  sB.innerHTML='<span class="search-spinner"></span>';
  fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q)+'&limit=6&addressdetails=1&accept-language=en')
  .then(function(r){return r.json()}).then(function(d){sR.innerHTML='';aIdx=-1;
    if(!d.length){sR.innerHTML='<div class="sr"><span class="srn">No results</span></div>';sR.style.display='block';return}
    d.forEach(function(r){var div=document.createElement('div');div.className='sr';
      div.innerHTML='<div class="srn">'+r.display_name.split(',').slice(0,3).join(', ')+'</div><div class="srd">'+(+r.lat).toFixed(4)+'\u00b0, '+(+r.lon).toFixed(4)+'\u00b0</div>';
      div.addEventListener('click',function(){pickR(+r.lat,+r.lon,r.display_name.split(',').slice(0,2).join(', '))});sR.appendChild(div)});sR.style.display='block'})
  .catch(function(){sR.innerHTML='<div class="sr"><span class="srn">Search error</span></div>';sR.style.display='block'})
  .finally(function(){sB.textContent='Search'})}
function pickR(lat,lon,name){sR.style.display='none';sI.value=name;selLoc(lat,lon,name)}
sI.addEventListener('input',function(){clearTimeout(dT);aIdx=-1;var q=sI.value.trim();if(q.length<3){sR.style.display='none';return}dT=setTimeout(function(){doSearch(q)},400)});
sI.addEventListener('keydown',function(e){var items=sR.querySelectorAll('.sr');
  if(e.key==='ArrowDown'){e.preventDefault();aIdx=Math.min(aIdx+1,items.length-1);items.forEach(function(it,i){it.classList.toggle('active',i===aIdx)})}
  else if(e.key==='ArrowUp'){e.preventDefault();aIdx=Math.max(aIdx-1,0);items.forEach(function(it,i){it.classList.toggle('active',i===aIdx)})}
  else if(e.key==='Enter'){e.preventDefault();if(aIdx>=0&&items[aIdx])items[aIdx].click();else doSearch(sI.value)}
  else if(e.key==='Escape')sR.style.display='none'});
sB.addEventListener('click',function(){doSearch(sI.value)});
document.addEventListener('click',function(e){if(!document.getElementById('search-box').contains(e.target))sR.style.display='none'});

function revGeo(lat,lon){return fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon+'&zoom=10&accept-language=en').then(function(r){return r.json()}).then(function(d){return d&&d.display_name?d.display_name.split(',').slice(0,2).join(',').trim():null}).catch(function(){return null})}

var MIN_INDEP=4;
function dedup(arr){var b={};arr.forEach(function(m){if(!b[m.fam]||m.km<b[m.fam].km)b[m.fam]=m});return Object.values(b).sort(function(a,b){return a.km-b.km})}
function famCounts(arr){var f={};arr.forEach(function(m){f[m.fam]=(f[m.fam]||0)+1});return f}

function selLoc(lat,lon,name){
  if(cityMarker)map.removeLayer(cityMarker);cityMarker=L.marker([lat,lon],{icon:pinIcon}).addTo(map);
  map.flyTo([lat,lon],Math.max(map.getZoom(),6),{duration:.8});
  var hint=document.querySelector('.click-hint');if(hint)hint.style.display='none';
  var bk=function(a,b){return a.km-b.km};
  var cov=M.filter(function(m){return inCov(lat,lon,m)});
  var sM=cov.filter(function(m){return m.tier==='short'}).sort(bk);
  var mM=cov.filter(function(m){return m.tier==='mid'}).sort(bk);
  var region=getRegion(lat,lon);
  var longAll=cov.filter(function(m){return m.tier==='long'});
  var lC=longAll.filter(function(m){return!m.ai&&(m.reg==='universal'||m.reg===region)}).sort(bk);
  var lA=longAll.filter(function(m){return m.ai}).sort(bk);
  var sD=dedup(sM),mD=dedup(mM);
  var sFb=[],mFb=[];
  if(sD.length<MIN_INDEP){var sFams={};sM.forEach(function(m){sFams[m.fam]=true});
    var mNew=mM.filter(function(m){return!sFams[m.fam]}).sort(bk);
    sFb=mNew.slice(0,MIN_INDEP-sD.length);
    var allSFams={};sM.concat(sFb).forEach(function(m){allSFams[m.fam]=true});
    if(sD.length+dedup(sFb).length<MIN_INDEP){var lNew=lC.filter(function(m){return!allSFams[m.fam]}).sort(bk);
      sFb=sFb.concat(lNew.slice(0,MIN_INDEP-sD.length-dedup(sFb).length))}}
  if(mD.length<MIN_INDEP){var mFams={};mM.forEach(function(m){mFams[m.fam]=true});
    var lNew=lC.filter(function(m){return!mFams[m.fam]}).sort(bk);
    mFb=lNew.slice(0,MIN_INDEP-mD.length)}
  showPanel(name,lat,lon,sM,mM,lC,lA,sFb,mFb)}

function algoLbl(n){if(n>=4)return{t:'Winsorised mean',i:'\ud83d\udcca'};if(n>=2)return{t:'Weighted mean',i:'\u2696\ufe0f'};if(n===1)return{t:'Single model',i:'\ud83c\udfaf'};return null}

function showPanel(name,lat,lon,sa,ma,lC,lA,sFb,mFb){
  document.getElementById('pn-name').textContent=name||'Selected Point';
  document.getElementById('pn-coords').textContent=Math.abs(lat).toFixed(4)+'\u00b0 '+(lat>=0?'N':'S')+', '+Math.abs(lon).toFixed(4)+'\u00b0 '+(lon>=0?'E':'W');
  var si=dedup(sa.concat(sFb)).length,mi=dedup(ma.concat(mFb)).length,li=dedup(lC).length+dedup(lA).length;
  document.getElementById('pn-counts').innerHTML='<div class="count-card"><span class="cn cs-col">'+si+'</span><span class="cl">Short</span><span class="cl-sub">indep.</span></div><div class="count-card"><span class="cn cm-col">'+mi+'</span><span class="cl">Mid</span><span class="cl-sub">indep.</span></div><div class="count-card"><span class="cn cl-col">'+li+'</span><span class="cl">Long</span><span class="cl-sub">indep.</span></div>';
  var rg=document.getElementById('pn-ranges');rg.innerHTML='';
  rTier(rg,'short',sa,sFb);rTier(rg,'mid',ma,mFb);rLong(rg,lC,lA);
  document.getElementById('city-panel').classList.add('visible')}

function mkRow(m,cls){var d=document.createElement('div');d.className='cm'+(cls?' '+cls:'');
  d.innerHTML='<span class="cmf">'+P[m.p].flag+'</span><span class="cmn">'+m.n+'</span><span class="fam-lbl">'+FL[m.fam]+'</span><span class="cmr">'+m.res+'</span><span class="cmh">'+m.h+'h</span>';d.title=P[m.p].full+' \u00b7 Family: '+FL[m.fam];return d}

function rTier(ct,tier,models,fb){
  var all=models.concat(fb);var dd=dedup(all);var indep=dd.length;
  var fc=famCounts(models);var dupFams=Object.keys(fc).filter(function(k){return fc[k]>1});
  var s=document.createElement('div');s.className='rs '+TC[tier];
  s.innerHTML='<h3>'+TL[tier]+' <span class="rc">('+models.length+' models \u2192 '+indep+' indep.)</span></h3>';
  var a=algoLbl(indep);if(a)s.insertAdjacentHTML('beforeend','<div class="algo-tag '+AC[tier]+'">'+a.i+' '+a.t+' (N='+indep+')</div>');
  if(dupFams.length>0){var dup=dupFams.map(function(f){return FL[f]+' \u00d7'+fc[f]}).join(', ');
    s.insertAdjacentHTML('beforeend','<div class="dedup-note">\u26a0\ufe0f Same family: '+dup+' \u2192 keep best resolution</div>')}
  if(models.length>0)models.forEach(function(m){var isDup=fc[m.fam]>1&&m.id!==dedup(models.filter(function(x){return x.fam===m.fam}))[0].id;s.appendChild(mkRow(m,isDup?'dimmed':''))});
  if(fb.length>0){s.insertAdjacentHTML('beforeend','<div class="algo-tag algo-fb">\ud83d\udd04 Fallback (+'+fb.length+')</div>');
    fb.forEach(function(m){s.appendChild(mkRow(m,'fallback'))})}
  if(!models.length&&!fb.length)s.insertAdjacentHTML('beforeend','<div class="no-models">No models available</div>');
  ct.appendChild(s)}

function rLong(ct,classic,ai){
  var allI=dedup(classic).length+dedup(ai).length;
  var s=document.createElement('div');s.className='rs rs-l';
  s.innerHTML='<h3>Long terme (120 h +) <span class="rc">('+(classic.length+ai.length)+' models \u2192 '+allI+' indep.)</span></h3>';
  if(classic.length>0){var cd=dedup(classic);var a=algoLbl(cd.length);
    s.insertAdjacentHTML('beforeend','<div class="sub-hdr">Classic NWP <span class="sub-cnt">('+classic.length+' \u2192 '+cd.length+' indep.)</span></div>');
    if(a)s.insertAdjacentHTML('beforeend','<div class="algo-tag algo-l">'+a.i+' '+a.t+'</div>');
    classic.forEach(function(m){s.appendChild(mkRow(m))})}
  if(ai.length>0){var ad=dedup(ai);var a2=algoLbl(ad.length);
    s.insertAdjacentHTML('beforeend','<div class="sub-hdr ai-hdr">\ud83e\udde0 AI / Hybrid <span class="sub-cnt">('+ai.length+' \u2192 '+ad.length+' indep.)</span></div>');
    if(a2)s.insertAdjacentHTML('beforeend','<div class="algo-tag" style="background:#1e1b4b;color:#a5b4fc">'+a2.i+' '+a2.t+'</div>');
    ai.forEach(function(m){s.appendChild(mkRow(m))})}
  if(!classic.length&&!ai.length)s.insertAdjacentHTML('beforeend','<div class="no-models">No models available</div>');
  ct.appendChild(s)}

function closePanel(){document.getElementById('city-panel').classList.remove('visible');if(cityMarker){map.removeLayer(cityMarker);cityMarker=null}}

map.on('click',function(e){var lon=((e.latlng.lng+180)%360+360)%360-180,lat=e.latlng.lat;
  selLoc(lat,lon,Math.abs(lat).toFixed(2)+'\u00b0'+(lat>=0?'N':'S')+', '+Math.abs(lon).toFixed(2)+'\u00b0'+(lon>=0?'E':'W'));
  revGeo(lat,lon).then(function(r){if(r){document.getElementById('pn-name').textContent=r;sI.value=r}})});

buildSB();sync();
</script>
</body>
